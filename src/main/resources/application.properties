spring.application.name=quick-commerce

# Datasource (overridable via environment for Docker)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/qcommerce}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:qcommerce}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:qcommerce}

# JPA / Hibernate (schema owned by Flyway, Hibernate only validates)
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true

# Flyway
spring.flyway.enabled=true

# Swagger / OpenAPI
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs

# JWT
app.jwt.secret=${APP_JWT_SECRET:change-me-in-production-this-secret-must-be-at-least-256-bits-long-0123456789}
app.jwt.expiration-ms=${APP_JWT_EXPIRATION_MS:86400000}

# Default admin bootstrap
app.admin.email=${APP_ADMIN_EMAIL:admin@qcommerce.local}
app.admin.password=${APP_ADMIN_PASSWORD:admin123}
